<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">FrontierCode 1.1 Main — pass rate (%)</text>

  <!-- axes: plot area x 90..710, y 60..300 ; scale 0..50 -->
  <line x1="90" y1="300" x2="710" y2="300" stroke="#334155" stroke-width="1.5"/>
  <line x1="90" y1="60" x2="90" y2="300" stroke="#334155" stroke-width="1.5"/>
  <!-- gridlines 0,10,20,30,40,50 : y = 300 - v*4.8 -->
  <g stroke="#e2e8f0" stroke-width="1" fill="#64748b" font-size="11" text-anchor="end">
    <line x1="90" y1="300" x2="710" y2="300"/><text x="82" y="304">0</text>
    <line x1="90" y1="252" x2="710" y2="252"/><text x="82" y="256">10</text>
    <line x1="90" y1="204" x2="710" y2="204"/><text x="82" y="208">20</text>
    <line x1="90" y1="156" x2="710" y2="156"/><text x="82" y="160">30</text>
    <line x1="90" y1="108" x2="710" y2="108"/><text x="82" y="112">40</text>
    <line x1="90" y1="60"  x2="710" y2="60"/><text x="82" y="64">50</text>
  </g>

  <!-- bars: 5 bars, width 80, gap. x centers at 150,260,370,480,590 -->
  <!-- Kimi K2.7 30.1 -> h=144.48 -> y=155.5 -->
  <rect x="110" y="155.5" width="80" height="144.5" fill="#94a3b8"/>
  <text x="150" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">30.1</text>
  <!-- Opus 4.7 38.5 -> h=184.8 -> y=115.2 -->
  <rect x="220" y="115.2" width="80" height="184.8" fill="#94a3b8"/>
  <text x="260" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">38.5</text>
  <!-- SWE-1.7 42.3 highlight -> h=203.04 -> y=96.96 -->
  <rect x="330" y="96.96" width="80" height="203.04" fill="#2563eb"/>
  <text x="370" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1d4ed8">42.3</text>
  <!-- GPT-5.5 43.0 -> h=206.4 -> y=93.6 -->
  <rect x="440" y="93.6" width="80" height="206.4" fill="#94a3b8"/>
  <text x="480" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">43.0</text>
  <!-- Opus 4.8 46.5 -> h=223.2 -> y=76.8 -->
  <rect x="550" y="76.8" width="80" height="223.2" fill="#94a3b8"/>
  <text x="590" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">46.5</text>

  <!-- labels -->
  <g font-size="11.5" text-anchor="middle" fill="#334155">
    <text x="150" y="318">Kimi K2.7</text><text x="150" y="332" font-size="10" fill="#64748b">(base)</text>
    <text x="260" y="318">Opus 4.7</text>
    <text x="370" y="318" font-weight="700" fill="#1d4ed8">SWE-1.7</text>
    <text x="480" y="318">GPT-5.5</text>
    <text x="590" y="318">Opus 4.8</text>
  </g>
  <text x="400" y="360" text-anchor="middle" font-size="12" fill="#475569">RL on top of Kimi K2.7 (+12.2 pts) — beating Opus 4.7, near GPT-5.5, at a fraction of the cost</text>
</svg>
