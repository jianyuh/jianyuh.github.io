<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Decoupled, Globally Distributed RL</text>

  <!-- Trainer -->
  <rect x="40" y="120" width="150" height="110" rx="10" fill="#1e293b"/>
  <text x="115" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Central</text>
  <text x="115" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Trainer</text>
  <text x="115" y="196" text-anchor="middle" font-size="11" fill="#cbd5e1">single fabric</text>
  <text x="115" y="212" text-anchor="middle" font-size="11" fill="#cbd5e1">Muon · async ckpt</text>

  <!-- delta -->
  <line x1="190" y1="150" x2="300" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#a4)"/>
  <text x="245" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">weight Δ</text>
  <text x="245" y="168" text-anchor="middle" font-size="10.5" fill="#dc2626">−99% size</text>

  <!-- object storage -->
  <rect x="300" y="118" width="130" height="66" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="365" y="146" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e293b">Cloud object</text>
  <text x="365" y="164" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e293b">storage</text>
  <text x="365" y="205" text-anchor="middle" font-size="10.5" fill="#64748b">every K steps</text>

  <!-- fan out to 3 inference clusters -->
  <g stroke="#059669" stroke-width="2" fill="none">
    <path d="M430 140 C 490 90, 520 70, 570 70" marker-end="url(#a5)"/>
    <path d="M430 151 C 500 151, 520 151, 570 151" marker-end="url(#a5)"/>
    <path d="M430 162 C 490 212, 520 232, 570 232" marker-end="url(#a5)"/>
  </g>

  <g>
    <rect x="570" y="48" width="150" height="46" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="645" y="70" text-anchor="middle" font-size="12.5" fill="#065f46">Inference · Americas</text>
    <text x="645" y="86" text-anchor="middle" font-size="10" fill="#059669">prefetch → 3–4s in-place</text>

    <rect x="570" y="128" width="150" height="46" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="645" y="150" text-anchor="middle" font-size="12.5" fill="#065f46">Inference · Europe</text>
    <text x="645" y="166" text-anchor="middle" font-size="10" fill="#059669">NVIDIA Dynamo reroutes</text>

    <rect x="570" y="208" width="150" height="46" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
    <text x="645" y="230" text-anchor="middle" font-size="12.5" fill="#065f46">Inference · Asia</text>
    <text x="645" y="246" text-anchor="middle" font-size="10" fill="#059669">serves rollouts</text>
  </g>

  <!-- rollouts return -->
  <path d="M570 275 C 300 320, 200 300, 120 235" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#a6)"/>
  <text x="360" y="330" text-anchor="middle" font-size="11.5" fill="#64748b">trajectories / rewards flow back to the trainer</text>

  <text x="380" y="352" text-anchor="middle" font-size="12" fill="#475569">1T-param cross-continental update: 1–2 min end-to-end</text>

  <defs>
    <marker id="a4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/></marker>
    <marker id="a5" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#059669"/></marker>
    <marker id="a6" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/></marker>
  </defs>
</svg>
