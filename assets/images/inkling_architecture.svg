      <rect x="30" y="170" width="16" height="16" rx="3"/><rect x="50" y="170" width="16" height="16" rx="3"/><rect x="70" y="170" width="16" height="16" rx="3"/><rect x="90" y="170" width="16" height="16" rx="3"/><rect x="110" y="170" width="16" height="16" rx="3"/><rect x="130" y="170" width="16" height="16" rx="3"/><rect x="150" y="170" width="16" height="16" rx="3"/><rect x="170" y="170" width="16" height="16" rx="3"/><rect x="190" y="170" width="16" height="16" rx="3"/><rect x="210" y="170" width="16" height="16" rx="3"/>
      <rect x="30" y="190" width="16" height="16" rx="3"/><rect x="50" y="190" width="16" height="16" rx="3"/><rect x="70" y="190" width="16" height="16" rx="3"/><rect x="90" y="190" width="16" height="16" rx="3"/><rect x="110" y="190" width="16" height="16" rx="3"/><rect x="130" y="190" width="16" height="16" rx="3"/><rect x="150" y="190" width="16" height="16" rx="3"/><rect x="170" y="190" width="16" height="16" rx="3"/><rect x="190" y="190" width="16" height="16" rx="3"/><rect x="210" y="190" width="16" height="16" rx="3"/>
    </g>
    <!-- active routed -->
    <g fill="#d1fae5" stroke="#059669" stroke-width="1.5">
      <rect x="50" y="170" width="16" height="16" rx="3"/><rect x="130" y="170" width="16" height="16" rx="3"/><rect x="190" y="170" width="16" height="16" rx="3"/>
      <rect x="70" y="190" width="16" height="16" rx="3"/><rect x="150" y="190" width="16" height="16" rx="3"/><rect x="210" y="190" width="16" height="16" rx="3"/>
    </g>
    <text x="240" y="182" font-size="10.5" fill="#64748b">…256 routed</text>
    <text x="240" y="200" font-size="10.5" fill="#059669">green = 6 active</text>
    <!-- shared -->
    <rect x="360" y="168" width="70" height="40" rx="6" fill="#fef3c7" stroke="#d97706"/><text x="395" y="185" text-anchor="middle" font-size="10.5" fill="#92400e">shared</text><text x="395" y="200" text-anchor="middle" font-size="10.5" fill="#92400e">×2</text>
  </g>

  <!-- key departures -->
  <text x="30" y="248" font-size="14" font-weight="700" fill="#7c3aed">Departures from the DeepSeek-V3 template</text>
  <g font-size="11" text-anchor="middle" fill="#334155">
    <rect x="30"  y="258" width="170" height="52" rx="8" fill="#faf5ff" stroke="#7c3aed"/><text x="115" y="280" font-weight="600">Relative pos. embed</text><text x="115" y="297" font-size="9.5" fill="#64748b">not RoPE → extrapolates to 1M</text>
    <rect x="212" y="258" width="170" height="52" rx="8" fill="#faf5ff" stroke="#7c3aed"/><text x="297" y="280" font-weight="600">Short convolutions</text><text x="297" y="297" font-size="9.5" fill="#64748b">after K/V + on residual branch</text>
    <rect x="394" y="258" width="170" height="52" rx="8" fill="#faf5ff" stroke="#7c3aed"/><text x="479" y="280" font-weight="600">Encoder-free MM</text><text x="479" y="297" font-size="9.5" fill="#64748b">dMel audio · 40×40 hMLP vision</text>
    <rect x="576" y="258" width="174" height="52" rx="8" fill="#faf5ff" stroke="#7c3aed"/><text x="663" y="280" font-weight="600">Muon + Adam</text><text x="663" y="297" font-size="9.5" fill="#64748b">WD ∝ LR²</text>
  </g>

  <!-- RL + effort -->
  <rect x="30" y="330" width="720" height="72" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="46" y="352" font-size="13" font-weight="700" fill="#1e293b">Post-training: 30M+ async RL rollouts</text>
  <text x="46" y="372" font-size="11" fill="#475569">• proper scoring rules + abstention-aware rewards (calibrated "I don't know")</text>
  <text x="46" y="390" font-size="11" fill="#475569">• reasoning aggregates scale <tspan font-weight="700" fill="#059669">log-linearly</tspan>; controllable effort + emergent CoT compression (verbose → telegraphic)</text>
