<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="780" height="420" fill="#ffffff"/>
  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Inkling — 975B total / 41B active MoE (1M context)</text>

  <!-- Attention interleave 5:1 -->
  <text x="30" y="62" font-size="14" font-weight="700" fill="#2563eb">Attention interleave — 5 sliding-window : 1 global</text>
  <g text-anchor="middle" font-size="10">
    <rect x="30"  y="72" width="90" height="34" rx="6" fill="#eff6ff" stroke="#60a5fa"/><text x="75" y="93" fill="#1e40af">SW</text>
    <rect x="126" y="72" width="90" height="34" rx="6" fill="#eff6ff" stroke="#60a5fa"/><text x="171" y="93" fill="#1e40af">SW</text>
    <rect x="222" y="72" width="90" height="34" rx="6" fill="#eff6ff" stroke="#60a5fa"/><text x="267" y="93" fill="#1e40af">SW</text>
    <rect x="318" y="72" width="90" height="34" rx="6" fill="#eff6ff" stroke="#60a5fa"/><text x="363" y="93" fill="#1e40af">SW</text>
    <rect x="414" y="72" width="90" height="34" rx="6" fill="#eff6ff" stroke="#60a5fa"/><text x="459" y="93" fill="#1e40af">SW</text>
    <rect x="510" y="72" width="110" height="34" rx="6" fill="#1e293b"/><text x="565" y="93" fill="#ffffff">GLOBAL</text>
