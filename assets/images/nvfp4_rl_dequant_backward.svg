<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Forward vs. Backward Alignment in NVFP4</text>

  <!-- Forward row -->
  <text x="40" y="72" font-size="13" font-weight="700" fill="#64748b">FORWARD (executed)</text>
  <rect x="40" y="82" width="90" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="85" y="110" text-anchor="middle" font-size="15" fill="#1e293b">x</text>
  <rect x="200" y="82" width="120" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="260" y="110" text-anchor="middle" font-size="15" fill="#1e293b">Q(w)  [FP4]</text>
  <rect x="390" y="82" width="180" height="46" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="480" y="110" text-anchor="middle" font-size="15" fill="#1e293b">y = x · Q(w)</text>
  <line x1="130" y1="105" x2="198" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="320" y1="105" x2="388" y2="105" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Naive backward -->
  <text x="40" y="188" font-size="13" font-weight="700" fill="#dc2626">✗ NAIVE BACKWARD (BF16)</text>
  <rect x="40" y="200" width="530" height="52" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="60" y="223" font-size="14" fill="#1e293b">differentiates  y = x · w</text>
  <text x="60" y="243" font-size="12.5" fill="#b91c1c">unaware of clipping/rounding → grad misaligns → norm spikes → divergence</text>

  <!-- Dequant backward -->
  <text x="40" y="298" font-size="13" font-weight="700" fill="#059669">✓ DEQUANTIZED BACKWARD</text>
  <rect x="40" y="310" width="530" height="40" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="335" font-size="14" fill="#1e293b">differentiates  y = x · DQ(Q(w))   — matches the exact tensor used in forward</text>

  <!-- side note -->
  <rect x="600" y="200" width="130" height="150" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="665" y="228" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">Result</text>
  <text x="665" y="256" text-anchor="middle" font-size="12" fill="#475569">no extra</text>
  <text x="665" y="272" text-anchor="middle" font-size="12" fill="#475569">tensor copies</text>
  <text x="665" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#059669">−70%</text>
  <text x="665" y="320" text-anchor="middle" font-size="12" fill="#475569">peak linear</text>
  <text x="665" y="336" text-anchor="middle" font-size="12" fill="#475569">memory</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
