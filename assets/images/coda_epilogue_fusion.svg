<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="780" height="420" fill="#ffffff"/>
  <text x="390" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">CODA: absorbing memory-bound ops into the GEMM epilogue</text>

  <!-- Standard path -->
  <text x="30" y="70" font-size="14" font-weight="700" fill="#dc2626">Standard: separate kernels, repeated global-memory round trips</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="30"  y="82" width="110" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="85" y="110" fill="#1e293b" font-weight="600">GEMM</text>
    <rect x="185" y="82" width="120" height="46" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="245" y="103" fill="#b91c1c">Norm / Act</text><text x="245" y="119" font-size="10" fill="#ef4444">memory-bound</text>
    <rect x="350" y="82" width="110" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="405" y="110" fill="#1e293b" font-weight="600">GEMM</text>
  </g>
  <!-- HBM round trips -->
  <line x1="140" y1="105" x2="183" y2="105" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="305" y1="105" x2="348" y2="105" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)"/>
  <text x="162" y="98" text-anchor="middle" font-size="9.5" fill="#dc2626">HBM</text>
  <text x="327" y="98" text-anchor="middle" font-size="9.5" fill="#dc2626">HBM</text>
  <text x="500" y="109" font-size="12" fill="#64748b">4 global reads/writes</text>

  <!-- divider -->
  <line x1="30" y1="152" x2="750" y2="152" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- CODA path -->
  <text x="30" y="184" font-size="14" font-weight="700" fill="#059669">CODA: op fused into the epilogue — output already on-chip, no extra trip</text>
  <rect x="30" y="196" width="330" height="80" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="46" y="217" font-size="12.5" font-weight="700" fill="#047857">GEMM (mainloop, locked &amp; fast)</text>
  <rect x="46" y="228" width="150" height="36" rx="6" fill="#ffffff" stroke="#34d399"/>
  <text x="121" y="251" text-anchor="middle" font-size="12" fill="#065f46">multiply-accumulate</text>
  <rect x="206" y="228" width="140" height="36" rx="6" fill="#d1fae5" stroke="#059669"/>
  <text x="276" y="245" text-anchor="middle" font-size="11.5" font-weight="600" fill="#065f46">EPILOGUE</text>
  <text x="276" y="258" text-anchor="middle" font-size="9.5" fill="#047857">norm/act/RoPE on-chip</text>
  <line x1="360" y1="236" x2="405" y2="236" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="410" y="218" width="110" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="465" y="246" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e293b">GEMM</text>
  <text x="560" y="242" font-size="12" fill="#64748b">1 write — regs/SMEM reused</text>

  <!-- 5 primitives -->
  <text x="30" y="316" font-size="13" font-weight="700" fill="#334155">Five tile-local epilogue primitives</text>
  <g font-size="11" text-anchor="middle" fill="#334155">
    <rect x="30"  y="326" width="140" height="40" rx="7" fill="#f1f5f9" stroke="#94a3b8"/><text x="100" y="343">elementwise / pairwise</text><text x="100" y="357" font-size="9.5" fill="#64748b">act, RoPE, residual</text>
    <rect x="180" y="326" width="115" height="40" rx="7" fill="#f1f5f9" stroke="#94a3b8"/><text x="237" y="343">vector load/store</text><text x="237" y="357" font-size="9.5" fill="#64748b">row/col broadcast</text>
    <rect x="305" y="326" width="110" height="40" rx="7" fill="#f1f5f9" stroke="#94a3b8"/><text x="360" y="343">tile load/store</text><text x="360" y="357" font-size="9.5" fill="#64748b">intermediates</text>
    <rect x="425" y="326" width="120" height="40" rx="7" fill="#f1f5f9" stroke="#94a3b8"/><text x="485" y="343">tile reduction</text><text x="485" y="357" font-size="9.5" fill="#64748b">row/col partials</text>
    <rect x="555" y="326" width="140" height="40" rx="7" fill="#f1f5f9" stroke="#94a3b8"/><text x="625" y="343">stateful transform</text><text x="625" y="357" font-size="9.5" fill="#64748b">max / sum-exp</text>
  </g>

  <text x="390" y="398" text-anchor="middle" font-size="12.5" fill="#7c3aed">Forward fuses f into the GEMM that <tspan font-weight="700">produces its input</tspan>; backward fuses f&#8242; into the GEMM that <tspan font-weight="700">produces its output gradient</tspan>.</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#dc2626"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#059669"/></marker>
  </defs>
</svg>
