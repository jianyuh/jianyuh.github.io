<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">The Harness as an "Operating System" for the LLM</text>

  <!-- Task layer -->
  <rect x="180" y="55" width="400" height="46" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="380" y="83" text-anchor="middle" font-size="15" font-weight="600" fill="#334155">Task / User goal</text>
  <line x1="380" y1="101" x2="380" y2="123" stroke="#94a3b8" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Harness layer -->
  <rect x="60" y="128" width="640" height="150" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="80" y="152" font-size="14" font-weight="700" fill="#1d4ed8">HARNESS  (control flow behind simple interfaces)</text>
  <!-- modules -->
  <g font-size="13" fill="#1e293b" text-anchor="middle">
    <rect x="80"  y="168" width="112" height="52" rx="8" fill="#ffffff" stroke="#60a5fa"/>
    <text x="136" y="190">Planning</text><text x="136" y="207" font-size="10.5" fill="#64748b">plan→exec→test</text>
    <rect x="204" y="168" width="112" height="52" rx="8" fill="#ffffff" stroke="#60a5fa"/>
    <text x="260" y="190">Context mgmt</text><text x="260" y="207" font-size="10.5" fill="#64748b">ACE / MCE</text>
    <rect x="328" y="168" width="112" height="52" rx="8" fill="#ffffff" stroke="#60a5fa"/>
    <text x="384" y="190">Tools</text><text x="384" y="207" font-size="10.5" fill="#64748b">call / observe</text>
    <rect x="452" y="168" width="112" height="52" rx="8" fill="#ffffff" stroke="#60a5fa"/>
    <text x="508" y="190">File memory</text><text x="508" y="207" font-size="10.5" fill="#64748b">read/write/grep</text>
    <rect x="576" y="168" width="112" height="52" rx="8" fill="#ffffff" stroke="#60a5fa"/>
    <text x="632" y="190">Sub-agents</text><text x="632" y="207" font-size="10.5" fill="#64748b">parallel jobs</text>
  </g>
  <text x="380" y="252" text-anchor="middle" font-size="12" fill="#475569">defined in <tspan font-weight="700">code</tspan> → the model can algorithmically optimize its own harness</text>
  <line x1="380" y1="278" x2="380" y2="300" stroke="#2563eb" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Base model -->
  <rect x="180" y="305" width="400" height="46" rx="10" fill="#1e293b"/>
  <text x="380" y="333" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Base LLM (weights)</text>

  <!-- shift note -->
  <text x="380" y="372" text-anchor="middle" font-size="12.5" fill="#7c3aed">Prompt Engineering (text, heuristic)  →  Harness Engineering (code, systems)</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
