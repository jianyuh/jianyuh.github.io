<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="380" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">Belgium 3–2 Senegal — the 86th-minute comeback</text>
  <text x="380" y="52" text-anchor="middle" font-size="12.5" fill="#64748b">Lumen Field, Seattle · 69,000 fans</text>

  <!-- timeline base -->
  <line x1="70" y1="170" x2="690" y2="170" stroke="#cbd5e1" stroke-width="3"/>

  <!-- "held 2-0" span -->
  <rect x="250" y="162" width="230" height="16" rx="8" fill="#d1fae5"/>
  <text x="365" y="150" text-anchor="middle" font-size="11.5" fill="#047857">2–0 for 86 minutes</text>

  <!-- comeback surge highlight -->
  <rect x="480" y="162" width="210" height="16" rx="8" fill="#fee2e2"/>
  <text x="585" y="150" text-anchor="middle" font-size="11.5" fill="#b91c1c">Belgium storm: 3 goals</text>

  <!-- Event dots -->
  <!-- KO -->
  <circle cx="70" cy="170" r="6" fill="#64748b"/>
  <text x="70" y="200" text-anchor="middle" font-size="11" fill="#475569">KO 1:00pm</text>

  <!-- Senegal 1-0 -->
  <circle cx="180" cy="170" r="7" fill="#059669"/>
  <text x="180" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">1–0</text>
  <text x="180" y="200" text-anchor="middle" font-size="10.5" fill="#059669">Senegal</text>

  <!-- Senegal 2-0 -->
  <circle cx="250" cy="170" r="7" fill="#059669"/>
  <text x="250" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">2–0</text>
  <text x="250" y="200" text-anchor="middle" font-size="10.5" fill="#059669">Senegal</text>

  <!-- Belgium 86' 2-1 -->
  <circle cx="500" cy="170" r="7" fill="#dc2626"/>
  <text x="500" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">2–1</text>
  <text x="500" y="200" text-anchor="middle" font-size="10.5" fill="#dc2626">86' Belgium</text>

  <!-- Belgium 88' 2-2 -->
  <circle cx="565" cy="170" r="7" fill="#dc2626"/>
  <text x="565" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">2–2</text>
  <text x="565" y="216" text-anchor="middle" font-size="10.5" fill="#dc2626">88' header</text>

  <!-- Belgium ET penalty 3-2 -->
  <circle cx="650" cy="170" r="8" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">3–2</text>
  <text x="650" y="200" text-anchor="middle" font-size="10.5" fill="#dc2626">ET · VAR pen</text>

  <!-- FT -->
  <circle cx="690" cy="170" r="6" fill="#1e293b"/>
  <text x="690" y="216" text-anchor="middle" font-size="10.5" fill="#334155">FT</text>

  <!-- takeaway -->
  <text x="380" y="270" text-anchor="middle" font-size="14" font-style="italic" fill="#334155">Down 0–2 at the 86th minute — and still they came back.</text>
  <text x="380" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Never give up. Keep pushing until the final whistle.</text>
</svg>
